<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Task Progress Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#071023">
    <style>
        :root{
            --bg:#0f1724;
            --card:#0b1220;
            --muted:#9aa6bf;
            --accent:#6ee7b7;
            --glass: rgba(255,255,255,0.03);
            --glass-2: rgba(255,255,255,0.02);
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            min-height:100vh;
            font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: linear-gradient(180deg,#071023 0%, #071827 60%);
            color:#e6eef8;
            padding:28px;
            -webkit-font-smoothing:antialiased;
        }
        .wrap{max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 360px;gap:20px}
        .card{background:linear-gradient(180deg,var(--card), #07121a);padding:18px;border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.6);}
        header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
        header h1{font-size:20px;margin:0}
        .controls{display:flex;gap:8px;flex-wrap:wrap}
        input[type=text], input[type=date], select{background:var(--glass);border:1px solid var(--glass-2);color:var(--muted);padding:8px 10px;border-radius:8px}
        button{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--accent);padding:8px 10px;border-radius:8px;cursor:pointer}
        button.primary{background:linear-gradient(90deg,var(--accent),#4fd1c5);color:#042028;border:none}
        .task-list{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:480px;overflow:auto;padding-right:6px}
        .task{display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:8px;background:linear-gradient(90deg, rgba(255,255,255,0.02), transparent)}
        .task .left{display:flex;gap:10px;align-items:center}
        .task .title{font-weight:600}
        .task .meta{font-size:12px;color:var(--muted)}
        .task.completed{opacity:0.6;text-decoration:line-through;background:linear-gradient(90deg, rgba(110,231,183,0.06), transparent)}
        .task button{margin-left:6px}
        .progress-block{display:flex;flex-direction:column;gap:12px}
        .bar{height:12px;background:rgba(255,255,255,0.05);border-radius:8px;overflow:hidden}
        .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#34d399);width:0%;transition:width 400ms}
        .summary{display:flex;flex-direction:column;gap:6px}
        .small{font-size:13px;color:var(--muted)}
        .right-col{display:flex;flex-direction:column;gap:12px}
        .mini-card{padding:12px;border-radius:10px;background:rgba(255,255,255,0.02)}
        .actions{display:flex;gap:8px;align-items:center}
        .spark{display:flex;gap:6px;align-items:end;height:48px}
        .spark > div{width:10px;border-radius:3px;background:linear-gradient(180deg,#34d399,#10b981)}
        footer{margin-top:14px;font-size:12px;color:var(--muted);text-align:center}
        @media(max-width:880px){.wrap{grid-template-columns:1fr;padding:0}}
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <header>
            <div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#34d399,#06b6d4);display:flex;align-items:center;justify-content:center;font-weight:700;color:#042028">TP</div>
            <div>
                <h1>Task Progress Tracker</h1>
                <div class="small">Add tasks, mark complete, and track daily progress</div>
            </div>
        </header>

        <section class="controls" style="align-items:center">
            <input id="taskName" type="text" placeholder="Task name" style="flex:1">
            <input id="taskDate" type="date">
            <select id="prioritySelect" title="Priority" style="width:110px">
                <option value="high">High</option>
                <option value="medium" selected>Medium</option>
                <option value="low">Low</option>
            </select>
            <input id="taskNote" type="text" placeholder="Note (optional)" style="width:200px">
            <button class="primary" id="addBtn">Add</button>
            <select id="viewDateSelect" title="Filter by date"></select>
            <input id="searchInput" type="text" placeholder="Search..." style="width:140px">
            <select id="sortSelect" title="Sort" style="width:140px">
                <option value="created_desc">Newest</option>
                <option value="created_asc">Oldest</option>
                <option value="date_asc">Date ↑</option>
                <option value="date_desc">Date ↓</option>
                <option value="name_asc">Name A→Z</option>
            </select>
            <button id="undoBtn" title="Undo last delete">Undo</button>
            <button id="clearAllBtn" title="Remove all tasks">Clear All</button>
            <button id="exportBtn">Export</button>
            <input id="importFile" type="file" accept="application/json" style="display:none">
            <button id="importBtn">Import</button>
        </section>

        <div class="task-list" id="taskList" aria-live="polite"></div>
        <footer>Tip: click Done to toggle completion. Use Export/Import to backup tasks.</footer>
    </div>

    <aside class="right-col">
        <div class="mini-card">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div>
                    <div class="small">Daily Progress</div>
                    <div style="font-size:20px;font-weight:700" id="dailyLabel">0%</div>
                </div>
                <div style="width:120px">
                    <div class="bar" aria-hidden><i id="dailyBar"></i></div>
                </div>
            </div>
            <div style="margin-top:10px" class="small">Total Progress <span id="totalLabel">0%</span></div>
            <div class="bar" style="margin-top:6px"><i id="totalBar"></i></div>
        </div>

        <div class="mini-card">
            <div class="small">Last 7 days</div>
            <div class="spark" id="spark"></div>
        </div>

        <div class="mini-card">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div class="small">Summary</div>
                <div class="small" id="counts">0 tasks</div>
            </div>
            <div class="summary" style="margin-top:8px">
                <div class="small">Today: <span id="todayCount">0</span> | Completed: <span id="todayDone">0</span></div>
                <div class="small">All tasks: <span id="allCount">0</span> | Done: <span id="allDone">0</span></div>
            </div>
        </div>
    </aside>
</div>

<script>
// Data handling and persistence
const STORAGE_KEY = 'tp_tasks_v1';
let tasks = loadTasks();

// Utilities
const $ = id => document.getElementById(id);
function todayISO(){ return new Date().toISOString().split('T')[0]; }
function loadTasks(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]') } catch(e){ return [] } }
function saveTasks(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

// UI wiring
const taskList = $('taskList');
const addBtn = $('addBtn');
const taskName = $('taskName');
const taskDate = $('taskDate');
const viewDateSelect = $('viewDateSelect');
const exportBtn = $('exportBtn');
const importBtn = $('importBtn');
const importFile = $('importFile');

// Init defaults
taskDate.value = todayISO();
addBtn.addEventListener('click', addTask);
exportBtn.addEventListener('click', exportJSON);
importBtn.addEventListener('click', ()=> importFile.click());
importFile.addEventListener('change', handleImportFile);

// Fill date filter with last 14 days + 'All'
function populateDateFilter(){
    viewDateSelect.innerHTML = '';
    const optAll = document.createElement('option'); optAll.value = ''; optAll.text = 'All dates';
    viewDateSelect.appendChild(optAll);
    for(let i=0;i<14;i++){ const d = new Date(); d.setDate(d.getDate()-i); const iso = d.toISOString().split('T')[0]; const o = document.createElement('option'); o.value = iso; o.text = i===0 ? iso + ' (Today)' : iso; viewDateSelect.appendChild(o); }
    viewDateSelect.value = '';
    viewDateSelect.addEventListener('change', render);
}

function addTask(){
    const name = taskName.value.trim();
    const date = taskDate.value;
    if(!name){ alert('Task name is required'); taskName.focus(); return; }
    if(!date){ alert('Please select a date'); taskDate.focus(); return; }
    tasks.push({ id: Date.now(), name, date, completed:false, created: new Date().toISOString() });
    saveAndRender();
    taskName.value=''; taskDate.value = todayISO(); taskName.focus();
}

function toggleTask(id){
    const t = tasks.find(x=>x.id===id); if(!t) return; t.completed = !t.completed; saveAndRender();
}

function editTask(id){
    const t = tasks.find(x=>x.id===id); if(!t) return;
    const newName = prompt('Edit task name', t.name);
    if(newName===null) return;
    t.name = newName.trim() || t.name;
    const newDate = prompt('Edit due date (YYYY-MM-DD)', t.date);
    if(newDate!==null){ if(/\d{4}-\d{2}-\d{2}/.test(newDate)) t.date = newDate; }
    saveAndRender();
}

function deleteTask(id){
    if(!confirm('Delete this task?')) return;
    tasks = tasks.filter(x=>x.id!==id); saveAndRender();
}

function saveAndRender(){ saveTasks(); render(); }

function render(){
    // filter
    const filterDate = viewDateSelect.value;
    const visible = filterDate ? tasks.filter(t=>t.date===filterDate) : tasks.slice().sort((a,b)=>b.created - a.created);
    taskList.innerHTML='';
    if(visible.length===0){ taskList.innerHTML = '<div class="small" style="padding:10px;color:var(--muted)">No tasks for selected date.</div>'; }
    visible.forEach(t=>{
        const div = document.createElement('div'); div.className='task' + (t.completed? ' completed':'');
        const left = document.createElement('div'); left.className='left';
        const cb = document.createElement('input'); cb.type='checkbox'; cb.checked = !!t.completed; cb.addEventListener('change', ()=> toggleTask(t.id));
        const meta = document.createElement('div');
        meta.innerHTML = `<div class="title">${escapeHtml(t.name)}</div><div class="meta">Due: ${t.date}</div>`;
        left.appendChild(cb); left.appendChild(meta);
        const actions = document.createElement('div'); actions.className='actions';
        const doneBtn = document.createElement('button'); doneBtn.textContent = t.completed? 'Undo':'Done'; doneBtn.addEventListener('click', ()=> toggleTask(t.id));
        const editBtn = document.createElement('button'); editBtn.textContent='Edit'; editBtn.addEventListener('click', ()=> editTask(t.id));
        const delBtn = document.createElement('button'); delBtn.textContent='Delete'; delBtn.addEventListener('click', ()=> deleteTask(t.id));
        actions.appendChild(doneBtn); actions.appendChild(editBtn); actions.appendChild(delBtn);
        div.appendChild(left); div.appendChild(actions);
        taskList.appendChild(div);
    });
    updateProgress();
}

function updateProgress(){
    const today = todayISO();
    const todayTasks = tasks.filter(t=>t.date===today);
    const todayDone = todayTasks.filter(t=>t.completed).length;
    const dailyPercent = todayTasks.length ? Math.round((todayDone / todayTasks.length) * 100) : 0;
    const allDone = tasks.filter(t=>t.completed).length;
    const totalPercent = tasks.length ? Math.round((allDone / tasks.length)*100) : 0;
    $('dailyLabel').textContent = dailyPercent + '%';
    $('totalLabel').textContent = totalPercent + '%';
    $('dailyBar').style.width = dailyPercent + '%';
    $('totalBar').style.width = totalPercent + '%';
    $('todayCount').textContent = todayTasks.length;
    $('todayDone').textContent = todayDone;
    $('allCount').textContent = tasks.length;
    $('allDone').textContent = allDone;
    $('counts').textContent = tasks.length + (tasks.length===1? ' task':' tasks');
    renderSpark();
}

function getLastNDays(n=7){
    const arr = [];
    for(let i=n-1;i>=0;i--){ const d = new Date(); d.setDate(d.getDate()-i); arr.push(d.toISOString().split('T')[0]); }
    return arr;
}

function renderSpark(){
    const days = getLastNDays(7);
    const container = $('spark'); container.innerHTML='';
    days.forEach(d=>{
        const total = tasks.filter(t=>t.date===d).length;
        const done = tasks.filter(t=>t.date===d && t.completed).length;
        const pct = total ? Math.round((done/total)*100) : 0;
        const bar = document.createElement('div'); bar.style.height = Math.max(6, Math.round(pct/100*48)) + 'px'; bar.title = `${d}: ${pct}% (${done}/${total})`;
        container.appendChild(bar);
    });
}

function exportJSON(){
    const blob = new Blob([JSON.stringify(tasks, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'tasks.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

function handleImportFile(e){
    const f = e.target.files[0]; if(!f) return; const reader = new FileReader(); reader.onload = ()=>{
        try{ const imported = JSON.parse(reader.result); if(!Array.isArray(imported)) throw new Error('Invalid format');
            // merge with existing but avoid duplicate ids
            const existingIds = new Set(tasks.map(t=>t.id));
            imported.forEach(it=>{ if(!it.id) it.id = Date.now() + Math.random(); if(!existingIds.has(it.id)) tasks.push(it); });
            saveAndRender(); alert('Import complete');
        }catch(err){ alert('Import failed: ' + err.message); }
    }; reader.readAsText(f); e.target.value='';
}

function importJSON(){ importFile.click(); }

function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]); }

// initial setup
populateDateFilter();
render();

// Expose for debugging (optional)
window._tp = { tasks, saveTasks };

// Register PWA Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js')
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.error("SW Registration failed:", err));
}

</script>
</body>
</html>
